<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-src 'none'; media-src 'none'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests"
    />
    <meta name="theme-color" content="#16664f" />
    <title>Sem conexão — Painel de Contratos</title>
    <link rel="icon" href="assets/icons/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="src/css/main.css" />
    <script src="src/js/offline.js" defer></script>
  </head>
  <body class="offline-page">
    <main class="offline-card" aria-labelledby="offlineTitle">
      <img
        src="assets/apple-touch-icon.png"
        width="96"
        height="96"
        alt="Brasão da Prefeitura de Iguape"
        decoding="async"
      />
      <p>Prefeitura Municipal de Iguape</p>
      <h1 id="offlineTitle">Sem conexão no momento</h1>
      <p>
        O painel fica disponível offline após a primeira visita. Tente novamente quando a rede
        voltar.
      </p>
      <button id="retryOfflineBtn" class="ghost-button" type="button">Tentar novamente</button>
    </main>
  </body>
</html>
